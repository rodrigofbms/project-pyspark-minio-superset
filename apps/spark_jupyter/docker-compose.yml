services:
  spark-master:
    build:
      context: ./spark
    container_name: spark-master
    command: >
      /opt/spark/bin/spark-class org.apache.spark.deploy.master.Master
    ports:
      - "8083:8080" # Spark UI
      - "7077:7077" # Spark UI Jobs
    networks:
      - bigdata

  spark-worker1:
    build:
      context: ./spark
    container_name: spark-worker1
    command: >
      /opt/spark/bin/spark-class org.apache.spark.deploy.worker.Worker spark://spark-master:7077
    depends_on:
      - spark-master
    networks:
      - bigdata

  spark-worker2:
    build:
      context: ./spark
    container_name: spark-worker2
    command: >
      /opt/spark/bin/spark-class org.apache.spark.deploy.worker.Worker spark://spark-master:7077
    depends_on:
      - spark-master
    networks:
      - bigdata

  jupyter:
    build:
      context: ./jupyter
    container_name: jupyter
    user: root # You must log in as root to change the UID and GID
    ports:
      - "8888:8888"
    volumes:
      - ${NOTEBOOK_PATH}:/home/jovyan/work
    environment:
      - NB_UID=${VM_UID} # The variable how set the UID in Jupyter notebook
      - NB_GID=${VM_GID} # The variable how set the GID in Jupyter notebook
      - CHOWN_HOME=yes # Allows the owner of the /home/jovyan directory to be changed to the configured user (NB_UID/NB_GID)
      - CHOWN_HOME_OPTS=-R # apply a option in "chown" command, it "-R" means recursive (applies to all files and subfolders)
      - PYSPARK_SUBMIT_ARGS=--master spark://spark-master:7077 pyspark-shell
    networks:
      - bigdata

networks:
  bigdata:
    external: true