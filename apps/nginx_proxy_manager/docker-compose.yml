services:
  app:
    image: 'docker.io/jc21/nginx-proxy-manager:2.14.0'
    restart: unless-stopped
    networks:
      - bigdata
    ports:
      - '80:80'
      - '81:81'
      - '443:443'
    volumes:
      - ./data:/data
      - ./letsencrypt:/etc/letsencrypt

networks:
  bigdata:
    external: true