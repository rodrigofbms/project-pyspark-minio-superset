repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.4.0
    hooks:
      - id: trailing-whitespace
        files: ^src/
      - id: check-added-large-files
        args: ['--maxkb=5000']
      - id: check-yaml
        files: ^src/
      - id: check-json
        files: ^src/

  - repo: https://github.com/psf/black
    rev: 24.2.0
    hooks:
      - id: black
        stages: [commit]
        files: ^src/

  - repo: https://github.com/pre-commit/mirrors-isort
    rev: v5.10.1
    hooks:
      - id: isort
        stages: [commit]
        files: ^src/
